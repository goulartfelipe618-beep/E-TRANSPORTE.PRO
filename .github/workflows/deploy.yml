# Deploy automático para GitHub Pages a cada push na branch main
# Depois do primeiro push: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Domínio próprio na raiz (https://e-transporte.pro). Para preview só em github.io/REPO use /REPO/
          VITE_BASE_PATH: /
          # Opcional: definir em Settings → Secrets and variables → Actions
          # para o chat Áxus funcionar em produção
          VITE_N8N_WEBHOOK_TEST: ${{ secrets.VITE_N8N_WEBHOOK_TEST }}
          VITE_N8N_WEBHOOK_PROD: ${{ secrets.VITE_N8N_WEBHOOK_PROD }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

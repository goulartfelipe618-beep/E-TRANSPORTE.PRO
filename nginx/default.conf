server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location = /manifest.webmanifest {
        try_files $uri =404;
    }

    location = /manifest.json {
        try_files $uri =404;
    }

    location /.well-known/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
